<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Tre ERP Docs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--brand:#5eb332;--brand-d:#3f7d22;--dark:#1a2332;--muted:#6b7280;--bd:#e4e7ec;--bg:#f6f7f9;}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(ellipse 900px 600px at 20% 0%,#eef6e9 0%,transparent 60%),radial-gradient(ellipse 900px 700px at 100% 100%,#e6f6f8 0%,transparent 55%),#fafbfc;color:var(--dark);display:grid;place-items:center;padding:24px;}
.panel{width:min(420px,100%);background:#fff;border:1px solid var(--bd);border-radius:14px;padding:26px;box-shadow:0 18px 50px rgba(26,35,50,.12);}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:24px;}
.mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--brand),var(--brand-d));color:#fff;display:grid;place-items:center;font-weight:800;}
.brand b{display:block;font-size:15px;}
.brand span{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:2px;}
h1{font-size:22px;line-height:1.25;margin:0 0 6px;}
p{margin:0 0 18px;color:var(--muted);font-size:13px;line-height:1.6;}
label{display:block;font-size:12px;font-weight:800;margin-bottom:8px;}
input{width:100%;height:44px;border:1px solid var(--bd);border-radius:10px;padding:0 12px;font:inherit;outline:none;}
input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(94,179,50,.14);}
.actions{display:flex;gap:10px;align-items:center;margin-top:14px;}
button,a{height:40px;border-radius:10px;font-size:13px;font-weight:800;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;}
button{border:0;background:var(--brand);color:#fff;padding:0 16px;cursor:pointer;}
a{border:1px solid var(--bd);color:var(--dark);background:var(--bg);padding:0 14px;}
.status{min-height:18px;margin-top:12px;color:#dc2626;font-size:12px;font-weight:700;}
.hint{margin-top:20px;padding-top:14px;border-top:1px solid var(--bd);font-size:11px;color:var(--muted);}
</style>
</head>
<body>
<main class="panel">
  <div class="brand">
    <div class="mark">Tre</div>
    <div><b>Tre ERP Docs</b><span>Admin editor</span></div>
  </div>
  <h1>Đăng nhập chỉnh sửa tài liệu</h1>
  <p>Sau khi đăng nhập, mở bất kỳ trang tài liệu nào và bấm <strong>Bật sửa</strong> để chỉnh text hoặc ảnh mà không thay đổi UI người xem.</p>
  <form id="loginForm">
    <label for="password">Mật khẩu admin</label>
    <input id="password" name="password" type="password" autocomplete="current-password" autofocus>
    <div class="actions">
      <button type="submit">Đăng nhập</button>
      <a href="index.html">Trang chủ</a>
    </div>
    <div class="status" id="status"></div>
  </form>
  <div class="hint">Nội dung sau khi lưu được commit vào GitHub và Vercel sẽ phục vụ lại cho tất cả người xem.</div>
</main>
<script>
(function(){
  var form = document.getElementById('loginForm');
  var status = document.getElementById('status');
  var next = new URLSearchParams(location.search).get('next') || '/index.html';
  form.addEventListener('submit', async function(event){
    event.preventDefault();
    status.textContent = 'Đang đăng nhập...';
    var response = await fetch('/api/admin-login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      credentials: 'same-origin',
      body: JSON.stringify({password: form.password.value})
    });
    var payload = await response.json().catch(function(){ return {}; });
    if(!response.ok){
      status.textContent = payload.error || 'Không đăng nhập được.';
      return;
    }
    window.location.href = next;
  });
})();
</script>
</body>
</html>
